name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-attest:
    name: Build USB images, attest, release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xz-utils dosfstools parted util-linux mtools curl gpg

      - name: Build SystemRescue rescue.img
        run: |
          mkdir -p dist
          ./bin/build-rescue-usb.sh --output dist/rescue.img

      - name: Build Memtest86+ memtest.img
        run: |
          ./bin/build-memtest-usb.sh --output dist/memtest.img

      - name: Compress artifacts
        run: |
          xz -T0 -9 dist/rescue.img
          xz -T0 -9 dist/memtest.img
          (cd dist && sha256sum *.img.xz > SHA256SUMS)

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: "dist/*.xz"

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            dist/*.xz
            dist/SHA256SUMS
