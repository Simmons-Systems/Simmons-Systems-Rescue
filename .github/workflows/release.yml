name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-attest:
    name: Build USB images, attest, release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xz-utils dosfstools parted util-linux mtools curl gpg

      - name: Build SystemRescue rescue.img
        run: |
          mkdir -p dist
          ./bin/build-rescue-usb.sh --output dist/rescue.img

      - name: Build Memtest86+ memtest.img
        run: |
          ./bin/build-memtest-usb.sh --output dist/memtest.img

      - name: Compress artifacts
        run: |
          xz -T0 -9 dist/rescue.img
          xz -T0 -9 dist/memtest.img
          (cd dist && sha256sum *.img.xz > SHA256SUMS)

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: "dist/*.xz"

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          generate_release_notes: true
          files: |
            dist/*.xz
            dist/SHA256SUMS
