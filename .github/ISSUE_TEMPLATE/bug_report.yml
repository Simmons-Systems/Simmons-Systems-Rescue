name: Bug report
description: Something is broken or behaves unexpectedly
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report! Please fill out the sections below so the issue can be reproduced.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: What you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduce
      description: A minimal example. Ideally the exact `bin/build-*.sh` invocation, or the autorun script section that misbehaved.
      placeholder: |
        # paste minimal repro here
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "Simmons-Systems-Rescue version / commit"
      description: "Release tag you flashed, or the commit SHA you built from."
      placeholder: "v0.1.0 or a1b2c3d"
    validations:
      required: true

  - type: input
    id: hardware
    attributes:
      label: Target hardware
      description: "What box did you boot the kit on? Make/model + RAM size + drive type."
      placeholder: "Intel NUC8i5BEK, 16GB DDR4, 256GB NVMe"

  - type: input
    id: dev-os
    attributes:
      label: Dev OS (where you ran `bin/build-*.sh`)
      placeholder: "Ubuntu 26.04 / Fedora 41 / etc."

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: "Paste the contents of `results-*.txt` from the USB if relevant, or the failing build-script output."
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help.
