name: Feature request
description: Suggest an improvement or new capability
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for project scope.

  - type: textarea
    id: problem
    attributes:
      label: What you're trying to do
      description: The user-facing problem.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like the project to provide.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What you tried or considered first.

  - type: textarea
    id: context
    attributes:
      label: Additional context
