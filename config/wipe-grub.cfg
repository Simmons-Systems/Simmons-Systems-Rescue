# GRUB menu for the Simmons-Systems-Rescue Disk Wipe USB
# Two paths: Wizard (interactive) and eWaste (auto-wipe with countdown)

set timeout=30
set default=0

insmod all_video
insmod gfxterm

if loadfont /boot/grub/fonts/unicode.pf2; then
    set gfxmode=auto
    terminal_output gfxterm
fi

set color_normal=white/black
set color_highlight=red/black
set menu_color_normal=white/black
set menu_color_highlight=red/black

menuentry "WIPE-WIZARD — Careful Mode (interactive, per-drive confirmation)" --class rescue {
    linux /sysrescue/boot/x86_64/vmlinuz archisobasedir=sysrescue archisolabel=YOURRESCUELABEL cow_spacesize=1G nofirewall dostartx=0 noautologin ar_nowifi ar_source=usb ar_suffixes=wipe-wizard
    initrd /sysrescue/boot/x86_64/sysrescue.img
}

menuentry " " --class spacer {
    true
}

menuentry "━━━━━━━━ DANGER ZONE ━━━━━━━━" --class separator {
    true
}

menuentry " " --class spacer {
    true
}

menuentry "WIPE-NOW — eWaste Mode (auto-wipe ALL drives after 5-min countdown)" --class danger {
    linux /sysrescue/boot/x86_64/vmlinuz archisobasedir=sysrescue archisolabel=YOURRESCUELABEL cow_spacesize=1G nofirewall dostartx=0 noautologin ar_nowifi ar_source=usb ar_suffixes=wipe-now
    initrd /sysrescue/boot/x86_64/sysrescue.img
}

menuentry " " --class spacer {
    true
}

menuentry "Power Off" --class shutdown {
    halt
}
